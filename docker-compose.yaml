version: "3"
services:
  turtlebot3_noetic:
    container_name: noetic-tb3
    image: noetic:tb3
    privileged: true
    build:
      context: .
      args:
        - USER_NAME=${USER_NAME}
        - GROUP_NAME=${GROUP_NAME}
        - UID=${UID}
        - GID=${GID}
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_MASTER_URI=${ROS_MASTER_URI}
      - PULSE_SERVER=unix:/tmp/pulseaudio.socket
      - PULSE_COOKIE=/tmp/pulseaudio.cookie
    volumes:
       - /tmp/.X11-unix:/tmp/.X11-unix
       - $HOME/.Xauthority/:/root/.Xauthority
         #source: ~/catkin_ws/src/turtlebot3_common
       - /dev:/dev
       - ./tb3_common:/home/${USER_NAME}/catkin_ws/src/tb3_common
       - ./tb3_navigation:/home/${USER_NAME}/catkin_ws/src/tb3_navigation
       #- ./roomba_planner:/home/${USER_NAME}/catkin_ws/src/roomba_planner
       #- ./ros_fuzzy_controller:/home/${USER_NAME}/catkin_ws/src/ros_fuzzy_controller
    devices:
       - /dev:/dev
    ipc: host
    network_mode: host
    tty: true
    stdin_open: true
    user: "${UID}:${GID}"
    command: /bin/bash
